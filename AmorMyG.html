<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestro Amor ❤️</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:Arial;
    background:linear-gradient(135deg,#ff6a88,#ff99ac);
    color:white;
    text-align:center;
}

h1{
    font-size:50px;
}

.contador{
    display:flex;
    gap:20px;
    margin-top:30px;
}

.caja{
    background:rgba(255,255,255,0.2);
    padding:20px;
    border-radius:15px;
    width:120px;
    animation: flotar 3s infinite ease-in-out;
}

.numero{
    font-size:35px;
    font-weight:bold;
}

.texto{
    font-size:14px;
}

@keyframes flotar{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

.corazon{
    position:absolute;
    color:white;
    animation: subir 6s linear infinite;
}

@keyframes subir{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-10vh);
        opacity:0;
    }
}

</style>
</head>

<body>

<h1>❤️ Nuestro tiempo juntos ❤️</h1>

<div class="contador">

<div class="caja">
<div id="años" class="numero">0</div>
<div class="texto">Años</div>
</div>

<div class="caja">
<div id="dias" class="numero">0</div>
<div class="texto">Días</div>
</div>

<div class="caja">
<div id="horas" class="numero">0</div>
<div class="texto">Horas</div>
</div>

<div class="caja">
<div id="minutos" class="numero">0</div>
<div class="texto">Minutos</div>
</div>

<div class="caja">
<div id="segundos" class="numero">0</div>
<div class="texto">Segundos</div>
</div>

</div>

<script>

let inicio = new Date("2026-01-01 00:00:00"); // CAMBIA ESTA FECHA

function actualizar(){

let ahora = new Date();
let diferencia = ahora - inicio;

let segundos = Math.floor(diferencia/1000);
let minutos = Math.floor(segundos/60);
let horas = Math.floor(minutos/60);
let dias = Math.floor(horas/24);
let años = Math.floor(dias/365);

segundos = segundos % 60;
minutos = minutos % 60;
horas = horas % 24;
dias = dias % 365;

document.getElementById("años").innerHTML = años;
document.getElementById("dias").innerHTML = dias;
document.getElementById("horas").innerHTML = horas;
document.getElementById("minutos").innerHTML = minutos;
document.getElementById("segundos").innerHTML = segundos;

}

setInterval(actualizar,1000);


// corazones flotando
function crearCorazon(){

let corazon = document.createElement("div");
corazon.classList.add("corazon");

corazon.innerHTML="❤️";

corazon.style.left=Math.random()*100+"vw";
corazon.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(corazon);

setTimeout(()=>{
corazon.remove();
},6000);

}

setInterval(crearCorazon,500);

</script>

</body>
</html>
